name: linux-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake ninja-build g++ libssl-dev libgl1-mesa-dev libopengl-dev \
            qt6-base-dev qt6-base-dev-tools qt6-declarative-dev qt6-declarative-dev-tools qt6-tools-dev-tools \
            qml6-module-qtquick qml6-module-qtquick-controls qml6-module-qtquick-layouts \
            qml6-module-qtqml-workerscript qml6-module-qtquick-templates \
            qml6-module-qtquick-window qml6-module-qtquick-dialogs \
            qml6-module-qt-labs-platform

      - name: Configure
        run: cmake -S . -B build-native -G Ninja -DCMAKE_BUILD_TYPE=Release -DOCTRA_BUILD_QT_APP=ON

      - name: Build
        run: cmake --build build-native --target octra_wallet_native -j2

      - name: Package release bundle
        run: |
          mkdir -p dist-linux
          cp build-native/octra_wallet_native dist-linux/
          cp README.md dist-linux/
          cp COPYING dist-linux/
          cat > dist-linux/README.txt <<'EOF'
          Octra IDE for Linux

          Run octra_wallet_native from this folder.
          This build expects Qt 6 runtime libraries to be installed on the system.
          EOF
          tar -C dist-linux -czf octra_ide_linux.tar.gz .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            build-native/octra_wallet_native
            octra_ide_linux.tar.gz

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            octra_ide_linux.tar.gz
