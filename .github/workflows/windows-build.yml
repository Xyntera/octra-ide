name: windows-build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-build.yml"
      - "CMakeLists.txt"
      - "native/**"
      - "lib/**"
      - "pvac/**"
      - "crypto_utils.hpp"
      - "rpc_client.hpp"
      - "wallet.hpp"
      - "static/templates/**"

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.2.4
          arch: win64_msvc2019_64
          cache: true

      - name: Configure
        shell: pwsh
        run: |
          $env:CC = "clang-cl"
          $env:CXX = "clang-cl"
          cmake -S . -B build-win-msvc `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DQt6_DIR="$env:Qt6_DIR" `
            -DOCTRA_BUILD_QT_APP=ON

      - name: Build
        shell: pwsh
        run: cmake --build build-win-msvc -j 2

      - name: Assemble portable bundle
        shell: pwsh
        run: |
          $qtPrefix = Resolve-Path (Join-Path $env:Qt6_DIR "..\..")
          $bundle = Join-Path $pwd "dist-win64"
          if (Test-Path $bundle) { Remove-Item $bundle -Recurse -Force }
          New-Item -ItemType Directory -Path $bundle | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $bundle "platforms") | Out-Null
          Copy-Item build-win-msvc\octra_wallet_native.exe $bundle
          Copy-Item (Join-Path $qtPrefix "bin\*.dll") $bundle
          Copy-Item (Join-Path $qtPrefix "plugins\platforms\qwindows.dll") (Join-Path $bundle "platforms")
          Copy-Item (Join-Path $qtPrefix "qml") $bundle -Recurse
          Copy-Item (Join-Path $qtPrefix "plugins") $bundle -Recurse
          Copy-Item (Join-Path $qtPrefix "translations") $bundle -Recurse
          @"
          [Paths]
          Prefix=.
          Plugins=plugins
          QmlImports=qml
          Translations=translations
          "@ | Set-Content (Join-Path $bundle "qt.conf") -Encoding ASCII
          Copy-Item COPYING (Join-Path $bundle "COPYING")
          @"
          Octra IDE for Windows

          This is a CI build artifact. Run octra_wallet_native.exe inside the folder.
          "@ | Set-Content (Join-Path $bundle "README.txt") -Encoding ASCII

      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path dist-win64\* -DestinationPath octra_ide_win64.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            build-win-msvc/octra_wallet_native.exe
            octra_ide_win64.zip
