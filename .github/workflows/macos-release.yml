name: macos-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.2.4
          arch: clang_64
          cache: true

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build-macos -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQt6_DIR="$Qt6_DIR" \
            -DOCTRA_BUILD_QT_APP=ON

      - name: Build
        shell: bash
        run: cmake --build build-macos -j 2

      - name: Deploy app bundle
        shell: bash
        run: |
          APP_BUNDLE="build-macos/octra_wallet_native.app"
          MACDEPLOYQT="$QT_ROOT_DIR/bin/macdeployqt"
          if [ ! -x "$MACDEPLOYQT" ]; then
            MACDEPLOYQT="$(command -v macdeployqt)"
          fi
          "$MACDEPLOYQT" "$APP_BUNDLE" -always-overwrite
          cp README.md "$APP_BUNDLE/Contents/Resources/README.md"
          cp COPYING "$APP_BUNDLE/Contents/Resources/COPYING"
          ditto -c -k --sequesterRsrc --keepParent "$APP_BUNDLE" octra_ide_macos.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            build-macos/octra_wallet_native.app
            octra_ide_macos.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            octra_ide_macos.zip
