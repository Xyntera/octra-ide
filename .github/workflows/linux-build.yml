name: linux-build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/linux-build.yml"
      - "CMakeLists.txt"
      - "native/**"
      - "lib/**"
      - "pvac/**"
      - "crypto_utils.hpp"
      - "rpc_client.hpp"
      - "wallet.hpp"
      - "static/templates/**"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake ninja-build g++ libssl-dev \
            qt6-base-dev qt6-base-dev-tools qt6-declarative-dev qt6-declarative-dev-tools qt6-tools-dev-tools \
            qml6-module-qtquick qml6-module-qtquick-controls qml6-module-qtquick-layouts \
            qml6-module-qtqml-workerscript qml6-module-qtquick-templates \
            qml6-module-qtquick-window qml6-module-qtquick-dialogs \
            qml6-module-qt-labs-platform

      - name: Configure
        run: cmake -S . -B build-native -G Ninja -DCMAKE_BUILD_TYPE=Release -DOCTRA_BUILD_QT_APP=ON

      - name: Build
        run: cmake --build build-native --target octra_wallet_native -j2

      - name: Verify binary
        run: |
          test -f build-native/octra_wallet_native
          file build-native/octra_wallet_native

      - name: Package
        run: |
          mkdir -p dist-linux
          cp build-native/octra_wallet_native dist-linux/
          cp README.md dist-linux/
          cp COPYING dist-linux/
          tar -C dist-linux -czf octra_wallet_native_linux.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            build-native/octra_wallet_native
            octra_wallet_native_linux.tar.gz
